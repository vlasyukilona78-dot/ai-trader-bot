name: Train AI Model

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "CSV dataset used by ai/train.py"
        required: true
        default: "data/processed/online_training_dataset_main.csv"
      model_dir:
        description: "Output directory for the V2 model bundle"
        required: true
        default: "ai/models"
      model_type:
        description: "Model backend: auto, sklearn, xgboost, lightgbm"
        required: true
        default: "auto"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate dataset
        run: |
          test -f "${{ inputs.dataset }}" || (echo "Missing dataset: ${{ inputs.dataset }}" && exit 1)

      - name: Run V2 model training
        run: |
          python -m ai.train \
            --dataset "${{ inputs.dataset }}" \
            --model-dir "${{ inputs.model_dir }}" \
            --model-type "${{ inputs.model_type }}"

      - name: Verify V2 model bundle
        run: |
          python - <<EOF
          from ai.inference.artifact_loader import validate_artifact_bundle

          bundle = validate_artifact_bundle("${{ inputs.model_dir }}", version="default")
          print("artifact contract ok", bundle.version, len(bundle.feature_names))
          EOF

      - name: Upload trained V2 model bundle
        uses: actions/upload-artifact@v4
        with:
          name: trained-v2-models
          path: |
            ${{ inputs.model_dir }}/model_win.pkl
            ${{ inputs.model_dir }}/model_horizon.pkl
            ${{ inputs.model_dir }}/scaler.pkl
            ${{ inputs.model_dir }}/calibrator.pkl
            ${{ inputs.model_dir }}/features.pkl
            ${{ inputs.model_dir }}/manifest.json
            ${{ inputs.model_dir }}/registry.json
          if-no-files-found: error
