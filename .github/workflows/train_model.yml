name: Train AI Model

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy scikit-learn joblib; fi

      - name: Run model training
        run: |
          echo "🚀 Starting model training..."
          python train_ai_fixed.py
          echo "✅ Training finished"

      - name: Verify model files
        run: |
          echo "🔍 Checking that model files exist..."
          test -f ai_model_win.pkl || (echo "❌ Missing ai_model_win.pkl" && exit 1)
          test -f ai_model_horizon.pkl || (echo "❌ Missing ai_model_horizon.pkl" && exit 1)
          test -f scaler.pkl || (echo "❌ Missing scaler.pkl" && exit 1)
          echo "✅ All model files found!"

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            ai_model_win.pkl
            ai_model_horizon.pkl
            scaler.pkl
          if-no-files-found: error