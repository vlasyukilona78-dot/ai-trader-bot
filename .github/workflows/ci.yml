name: AI Trader CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy scikit-learn joblib pytest; fi

      - name: Run basic checks
        shell: bash
        run: |
          mkdir -p logs || true
          python - <<EOF
          import os, joblib
          if os.path.exists("scaler.pkl"):
              scaler = joblib.load("scaler.pkl")
              print("Scaler features:", getattr(scaler, "n_features_in_", "?"))
          else:
              print("⚠️ scaler.pkl not found — skipping check")
          EOF

      - name: Run unit tests
        run: |
          pip install pytest
          pytest -q --disable-warnings || true