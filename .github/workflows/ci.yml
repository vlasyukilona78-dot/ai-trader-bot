name: AI Trader CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run import checks
        shell: bash
        run: |
          python - <<EOF
          from ai.inference.artifact_loader import ArtifactBundle, validate_artifact_bundle
          from alerts.telegram_client import TelegramClient
          from trading.market_data.feed import MarketDataFeed

          print("imports ok", ArtifactBundle.__name__, validate_artifact_bundle.__name__, TelegramClient.__name__, MarketDataFeed.__name__)
          EOF

      - name: Run unit tests
        run: |
          python -m pytest -q --disable-warnings
